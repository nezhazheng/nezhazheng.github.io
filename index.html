<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ship Speed - Claude Team Release Calendar</title>
  <meta name="description" content="Track everything Claude Team ships. A live calendar of Anthropic product releases.">
  <meta property="og:title" content="Ship Speed - Claude Team Release Calendar">
  <meta property="og:description" content="Track everything Claude Team ships. A live calendar of Anthropic product releases.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://shipspeed.cc">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <span class="brand-icon">✳</span>
        <span class="brand-label">ANTHROPIC RELEASES</span>
      </div>
      <h1>Everything <span class="highlight">Claude Team</span> shipped in <span id="day-count">--</span> days</h1>
      <p class="subtitle">
        <span id="date-range"></span>. Product releases only.
      </p>
    </header>

    <section class="stats-bar" aria-label="Release stats">
      <div class="stat-item">
        <div class="stat-value" id="stat-releases">--</div>
        <div class="stat-label">Releases</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-days">--</div>
        <div class="stat-label">Days</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-active-days">--</div>
        <div class="stat-label">Active Days</div>
      </div>
    </section>

    <section class="tracked-people" id="tracked-people">
    </section>

    <section class="calendar-toolbar" aria-label="Calendar controls">
      <div class="month-nav">
        <button class="month-nav-button" id="prev-month" type="button" aria-label="Show previous month">‹</button>
        <div class="month-nav-copy">
          <div class="month-nav-label" id="visible-month-label">--</div>
          <div class="month-nav-caption" id="visible-month-caption">Monthly view</div>
        </div>
        <button class="month-nav-button" id="next-month" type="button" aria-label="Show next month">›</button>
      </div>

      <div class="range-controls">
        <label class="range-field" for="start-date">
          <span>Start</span>
          <input type="date" id="start-date">
        </label>
        <label class="range-field" for="end-date">
          <span>End</span>
          <input type="date" id="end-date">
        </label>
        <button class="range-reset" id="current-month-button" type="button">This Month</button>
      </div>
    </section>

    <section class="legend" id="legend" aria-label="Release categories">
    </section>

    <main class="calendar" id="calendar">
    </main>

    <footer>
      <p class="attribution">Attribution based on first X announcement. Data auto-updated hourly.</p>
      <p class="source">
        <a href="https://github.com/nezhazheng/nezhazheng.github.io" target="_blank">Source</a>
        &middot; shipspeed.cc
      </p>
    </footer>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script src="js/app.js"></script>
</body>
</html>
